services:
  postgres:
    image: postgres:15-alpine
    container_name: gad-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gadpass}
      POSTGRES_DB: ${POSTGRES_DB:-gad_ai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gad}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: gad-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: gad-ai-api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
  scanner:
    build:
      context: .
      dockerfile: services/scanner/Dockerfile
    container_name: gad-ai-scanner
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
  telegram:
    build:
      context: .
      dockerfile: services/telegram/Dockerfile
    container_name: gad-ai-telegram
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      FUTURES_API_URL: "http://futures:4003"
    depends_on:
      api:
        condition: service_started
  whale-tracker:
    build:
      context: .
      dockerfile: services/whale-tracker/Dockerfile
    container_name: gad-ai-whale-tracker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      api:
        condition: service_started
  autobuy:
    build:
      context: .
      dockerfile: services/autobuy/Dockerfile
    container_name: gad-ai-autobuy
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      api:
        condition: service_started
  dashboard:
    build:
      context: services/dashboard
      dockerfile: Dockerfile
    container_name: gad-ai-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
  landing:
    build:
      context: services/landing
      dockerfile: Dockerfile
    container_name: gad-ai-landing
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
  social-monitor:
    build:
      context: .
      dockerfile: services/social-monitor/Dockerfile
    container_name: gad-ai-social-monitor
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      SOCIAL_POLL_INTERVAL_SECONDS: "120"
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
  auth:
    build:
      context: services/auth
      dockerfile: Dockerfile
    container_name: gad-ai-auth
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gad}:${POSTGRES_PASSWORD:-gadpass}@postgres:5432/${POSTGRES_DB:-gad_ai}
      PORT: "4001"
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
  payments:
    build:
      context: services/payments
      dockerfile: Dockerfile
    container_name: gad-ai-payments
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gad}:${POSTGRES_PASSWORD:-gadpass}@postgres:5432/${POSTGRES_DB:-gad_ai}
      PORT: "4002"
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
  futures:
    build:
      context: .
      dockerfile: services/futures/Dockerfile
    container_name: gad-ai-futures
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      FUTURES_ENABLED: "true"
      FUTURES_LIVE_MODE: "false"
      FUTURES_SIGNAL_INTERVAL_MS: "300000"
      FUTURES_MIN_MACRO_SCORE: "45"
      FUTURES_MIN_SIGNAL_STR: "55"
      FUTURES_TP_PCT: "0.04"
      FUTURES_SL_PCT: "0.02"
      FUTURES_TRAIL_PCT: "0.015"
      FUTURES_BE_TRIGGER: "0.03"
      FUTURES_DAILY_STOP_PCT: "0.06"
      FUTURES_MAX_TRADES_DAY: "6"
      FUTURES_RISK_PCT: "0.02"
      FUTURES_API_PORT: "4003"
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres-data:
